<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>お問い合わせ | 東三河支部 愛知県ソフトバレーボール連盟</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#cc0000;--red-d:#990000;--navy:#1a1a2e;--white:#fff;--light:#f8f8f8;--gray:#666;--border:#e0e0e0;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;color:#222;background:#fff;line-height:1.7;}

/* ヘッダー・フッターなどはそのまま維持 */
header{background:#fff;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.hdr{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.logo-txt .sup{font-size:10px;color:var(--gray);letter-spacing:.06em;}
.logo-txt .name{font-size:18px;font-weight:900;color:var(--navy);}
nav{display:flex;gap:2px;flex-wrap:wrap;}
nav a{color:var(--navy);text-decoration:none;font-size:13px;font-weight:700;padding:7px 11px;border-radius:4px;transition:all .18s;}
nav a:hover{background:var(--red);color:#fff;}
nav a.active{background:var(--red);color:#fff;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none;}
.hamburger span{display:block;width:24px;height:2px;background:var(--navy);border-radius:2px;transition:all .3s;}
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(26,26,46,0.97);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.mobile-nav.open{display:flex;}
.mobile-nav a{color:#fff;text-decoration:none;font-size:20px;font-weight:900;padding:14px 40px;width:80%;text-align:center;border-bottom:1px solid rgba(255,255,255,.1);}

.page-hero{background:var(--navy);padding:56px 24px 48px;position:relative;}
.page-hero-in{max-width:1100px;margin:0 auto;color:#fff;}
.page-hero-badge{display:inline-block;background:#fff;color:var(--red);font-size:11px;font-weight:900;padding:4px 14px;border-radius:2px;margin-bottom:14px;}
.page-hero h1{font-size:clamp(24px,4vw,42px);font-weight:900;margin-bottom:10px;}

main{max-width:760px;margin:0 auto;padding:56px 24px 80px;}
.notice-box{background:#fff8e0;border-left:4px solid #cc9900;border-radius:0 6px 6px 0;padding:16px 20px;margin-bottom:36px;font-size:13px;color:#665500;}

footer{background:var(--navy);color:rgba(255,255,255,.5);padding:36px 24px;text-align:center;}

@media(max-width:768px){
  nav{display:none;}
  .hamburger{display:flex;}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a href="index.html" class="logo">
      <div class="logo-txt">
        <div class="sup">愛知県ソフトバレーボール連盟</div>
        <div class="name">東三河支部</div>
      </div>
    </a>
    <nav>
      <a href="index.html#news">お知らせ</a>
      <a href="contact.html" class="active">お問い合わせ</a>
    </nav>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="page-hero">
  <div class="page-hero-in">
    <div class="page-hero-badge">CONTACT</div>
    <h1>📬 お問い合わせ</h1>
  </div>
</div>

<main>
  <div class="notice-box">
    <strong>📌 ご確認ください</strong>
    送信ボタンを押した後、Googleの回答完了画面が表示されます。
  </div>

  <div style="width: 100%; max-width: 760px; margin: 0 auto; text-align: center;">
    <iframe 
      src="https://docs.google.com/forms/d/e/1FAIpQLSf-XnjDFtzn-BRFJhB63nPPjTdolIs_Lk1szCxxyt9GP9JGrQ/viewform?embedded=true" 
      width="100%" 
      height="1244" 
      frameborder="0" 
      marginheight="0" 
      marginwidth="0">
      読み込んでいます…
    </iframe>
  </div>
</main>

<footer>
  <div class="ft-copy">© 2025 愛知県ソフトバレーボール連盟 東三河支部</div>
</footer>

<script>
const hamburger = document.getElementById('hamburger');
const mobileNav = document.getElementById('mobileNav');
if(hamburger) hamburger.addEventListener('click', () => {
    document.getElementById('mobileNav')?.classList.toggle('open');
});
</script>

</body>
</html>
